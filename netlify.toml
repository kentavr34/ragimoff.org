# Netlify konfiqurasiyası
# Bu fayl avtomatik işləyir — dəyişməyin

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Sürətli yükləmə üçün header-lər
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SEO redirects — сохраняем старые URL
[[redirects]]
  from = "/3"
  to = "/3.html"
  status = 200

[[redirects]]
  from = "/5"
  to = "/5.html"
  status = 200

[[redirects]]
  from = "/2"
  to = "/2.html"
  status = 200

[[redirects]]
  from = "/dragimoff"
  to = "/haqqimda.html"
